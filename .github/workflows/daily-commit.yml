name: Daily Automated Commit

on:
  schedule:
    - cron: "30 6 * * *"   # Runs daily at 06:30 UTC (specific hour/minute)
  workflow_dispatch:      # Allows manual trigger

jobs:
  daily_commit_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Daily update step - 23f1000005@ds.study.iitm.ac.in
        run: |
          echo "Last automated update: $(date)" > daily_log.txt

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add daily_log.txt
          git commit -m "Automated daily commit"
          git push
