name: Daily Automated Commit

on:
  schedule:
    - cron: "30 6 * * *"   # Daily at 06:30 UTC (specific time)
  workflow_dispatch:

permissions:
  contents: write   # ✅ allows commit & push

jobs:
  daily_commit_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Daily update step - 23f1000005@ds.study.iitm.ac.in
        run: |
          echo "Last automated update: $(date)" > daily_log.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add daily_log.txt
          git commit -m "Automated daily commit"
          git push origin main
